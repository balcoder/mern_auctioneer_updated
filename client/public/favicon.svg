<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" aria-labelledby="title desc" role="img">
  <title id="title">BarrettEstate Logo</title>
  <desc id="desc">Stylized house icon for Barrett Estate Real Estate</desc>
  
  <!-- House icon -->
  <path d="M50 110 L50 160 L150 160 L150 110 L100 60 Z" fill="#1e3a8a" stroke="#111827" stroke-width="12" stroke-linejoin="round"/>
  
  <!-- Roof -->
  <polygon points="40,110 100,50 160,110" fill="#1e40af" stroke="#111827" stroke-width="12" stroke-linejoin="round"/>
  
  <!-- Door -->
  <rect x="85" y="130" width="18" height="30" fill="#f59e0b" stroke="#111827" stroke-width="8"/>
  
  <!-- Window -->
  <rect x="115" y="125" width="22" height="22" fill="#dbeafe" stroke="#111827" stroke-width="8"/>
  <line x1="126" y1="125" x2="126" y2="147" stroke="#111827" stroke-width="4"/>
  <line x1="115" y1="136" x2="137" y2="136" stroke="#111827" stroke-width="4"/>
  
  <!-- Initials -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#1e3a8a" letter-spacing="-2">BE</text>
</svg>